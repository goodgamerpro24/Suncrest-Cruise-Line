<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suncrest Cruise Line - Bahamas Sailings</title>
    <style>
        :root {
            --primary-blue: #104c81;
            --accent-red: #e63946;
            --light-gray: #f4f6f9;
            --dark-blue: #0b3154;
            --text-dark: #222;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--light-gray);
            color: var(--text-dark);
        }

        /* Navigation */
        .navbar {
            background-color: var(--primary-blue);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        .back-btn {
            background-color: var(--accent-red);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Hero */
        .hero {
            background: linear-gradient(rgba(16, 76, 129, 0.75), rgba(11, 49, 84, 0.85)), url('bahamas.JPG') center/cover;
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 { margin: 0; font-size: 36px; }
        .hero p { margin: 10px 0 0 0; font-size: 18px; }

        /* Filter Panel */
        .search-engine {
            background: white;
            max-width: 1100px;
            margin: -30px auto 30px auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 5px;
        }

        .filter-group select {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: white;
            font-size: 14px;
            outline: none;
        }

        /* Results Counter */
        .results-header {
            max-width: 1100px;
            margin: 0 auto 15px auto;
            padding: 0 20px;
            font-size: 18px;
            color: var(--dark-blue);
            font-weight: bold;
        }

        /* Itinerary List styling */
        .itinerary-list {
            max-width: 1100px;
            margin: 0 auto 50px auto;
            padding: 0 20px;
        }

        .itinerary-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        .card-main {
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            align-items: center;
        }

        .ship-img {
            width: 220px;
            height: 140px;
            object-fit: cover;
            border-radius: 6px;
        }

        .card-details {
            flex: 1;
            padding: 0 20px;
            min-width: 280px;
        }

        .card-details h2 {
            margin: 0 0 5px 0;
            color: var(--dark-blue);
            font-size: 22px;
        }

        .ship-badge {
            display: inline-block;
            background-color: #eef4fa;
            color: var(--primary-blue);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .route-path {
            font-size: 14px;
            color: #444;
        }

        .card-action {
            text-align: right;
            min-width: 160px;
        }

        .price-label { font-size: 12px; color: #666; }
        .price-value { font-size: 32px; font-weight: bold; color: var(--dark-blue); margin-bottom: 10px; }

        .btn-view-dates {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        .btn-view-dates:hover {
            background-color: var(--accent-red);
        }

        /* Day Timeline */
        .timeline-section {
            background-color: #fafbfc;
            border-top: 1px solid #f0f0f0;
            padding: 15px 20px;
        }

        .timeline-title { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 8px; }
        
        .timeline-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .timeline-day {
            background-color: #eef2f6;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: var(--dark-blue);
        }

        /* Pricing Dropdown */
        .pricing-dropdown {
            display: none;
            background-color: #f8fafc;
            border-top: 1px dashed #cbd5e1;
            padding: 20px;
        }

        .pricing-dropdown.active {
            display: block;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .price-card {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .price-header {
            background-color: #e2e8f0;
            color: var(--dark-blue);
            font-weight: bold;
            text-align: center;
            padding: 10px;
            font-size: 13px;
        }

        .category-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 12px;
        }

        .category-row:last-of-type { border-bottom: none; }

        .book-now-btn {
            display: block;
            background-color: var(--accent-red);
            color: white;
            text-align: center;
            padding: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

                <option value="Miami">Miami, FL</option>
                <option value="Orlando">Orlando (Port Canaveral), FL</option>

        </div>

        <div class="filter-group">
            <label for="filter-duration">Duration</label>

                <option value="3">3 Days</option>
                <option value="4">4 Days</option>
                <option value="5">5 Days</option>

        </div>
    </div>

        function renderItineraries(list) {
            const container = document.getElementById("itinerary-list");
            const counter = document.getElementById("results-count");
            container.innerHTML = "";

            counter.innerText = `${list.length} Cruise${list.length === 1 ? "" : "s"} Found Matching Your Search`;

            if(list.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 40px; font-weight:bold; color:#555;">No cruises found matching these options.</div>`;
                return;
            }

            list.forEach(item => {
                // Generate timeline
                let timelineHTML = "";
                item.days.forEach((day, index) => {
                    timelineHTML += `<div class="timeline-day">Day ${index + 1}: ${day}</div>`;
                });

                // Generate dates grid
                let datesHTML = "";
                item.dates.forEach(date => {
                    datesHTML += `
                        <div class="price-card">
                            <div class="price-header">${date.range}</div>
                            <div class="category-row">
                                <span>Interior</span>
                                <strong>$${date.prices.interior}*</strong>
                            </div>
                            <div class="category-row">
                                <span>Ocean View</span>
                                <strong>$${date.prices.oceanview}*</strong>
                            </div>
                            <div class="category-row">
                                <span>Balcony</span>
                                <strong>$${date.prices.balcony}*</strong>
                            </div>
                            <div class="category-row">
                                <span>Suite</span>
                                <strong>$${date.prices.suite}*</strong>
                            </div>
                            <a href="#" class="book-now-btn">Start Booking</a>
                        </div>
                    `;
                });

                const cardHTML = `
                    <div class="itinerary-card">
                        <div class="card-main">
                            <img src="bahamas.JPG" class="ship-img" alt="${item.ship}">
                            <div class="card-details">
                                <span class="ship-badge">🚢 ${item.ship}</span>
                                <h2>${item.duration}-Day Bahamas Cruise</h2>
                                <p class="route-path"><strong>Route:</strong> ${item.route}</p>
                            </div>
                            <div class="card-action">
                                <span class="price-label">Starting at</span>
                                <div class="price-value">$${item.basePrice}*</div>
                                <button class="btn-view-dates" onclick="togglePricing('${item.id}')">Show Dates</button>
                            </div>
                        </div>
                        <div class="timeline-section">
                            <div class="timeline-title">ITINERARY PATHWAY</div>
                            <div class="timeline-grid">${timelineHTML}</div>
                        </div>
                        <div class="pricing-dropdown" id="dropdown-${item.id}">
                            <div style="font-weight:bold; color:var(--dark-blue); margin-bottom:10px;">Select Dates & Room Category</div>
                            <div class="pricing-grid">${datesHTML}</div>
                        </div>
                    </div>

            });
        }

        function togglePricing(id) {
            const dropdown = document.getElementById(`dropdown-${id}`);
            dropdown.classList.toggle("active");
        }

        function updateFilters() {
            const selectedYear = document.getElementById("filter-year").value;
            const selectedPort = document.getElementById("filter-port").value;
            const selectedDur = document.getElementById("filter-duration").value;

            const filteredList = database.filter(item => {
                const yearMatch = (item.year === "all" || item.year === selectedYear);
                const portMatch = (selectedPort === "all" || item.homeport === selectedPort);
                const durationMatch = (selectedDur === "all" || item.duration.toString() === selectedDur);
                return yearMatch && portMatch && durationMatch;
            });

            renderItineraries(filteredList);
        }

        // Run on load
        window.onload = function() {
            updateFilters();
        };
