function renderItineraries(list) { const container = document.getElementById("itinerary-list"); const counter = document.getElementById("results-count");
if (!container || !counter) return;
container.innerHTML = ""; counter.innerText = list.length + " Cruise" + (list.length === 1 ? "" : "s") + " Found Matching Your Search";
if (list.length === 0) { container.innerHTML = '<div style="text-align:center; padding: 40px; font-weight:bold; color:#555;">No cruises found matching these options.</div>'; return; }
list.forEach(function(item) { let timelineHTML = ""; item.days.forEach(function(day, index) { timelineHTML += '<div class="timeline-day">Day ' + (index + 1) + ': ' + day + '</div>'; });
let datesHTML = ""; item.dates.forEach(function(date) { datesHTML += <div class="price-card"> <div class="price-header">${date.range}</div> <div class="category-row"> <span>Interior</span> <strong>$${date.prices.interior}*</strong> </div> <div class="category-row"> <span>Ocean View</span> <strong>$${date.prices.oceanview}*</strong> </div> <div class="category-row"> <span>Balcony</span> <strong>$${date.prices.balcony}*</strong> </div> <div class="category-row"> <span>Suite</span> <strong>$${date.prices.suite}*</strong> </div> <a href="#" class="book-now-btn">Start Booking</a> </div>; });
const cardHTML = <div class="itinerary-card"> <div class="card-main"> <img src="bahamas.JPG" class="ship-img" alt="${item.ship}"> <div class="card-details"> <span class="ship-badge">🚢 ${item.ship}</span> <span class="variant-badge">${item.variant}</span> <h2>${item.duration}-Day Bahamas Cruise (${item.homeport})</h2> <p class="route-path"><strong>Route:</strong> ${item.route}</p> </div> <div class="card-action"> <span class="price-label">Starting at</span> <div class="price-value">$${item.basePrice}*</div> <button class="btn-view-dates" onclick="togglePricing('${item.id}')">Show Dates</button> </div> </div> <div class="timeline-section"> <div class="timeline-title">ITINERARY PATHWAY</div> <div class="timeline-grid">${timelineHTML}</div> </div> <div class="pricing-dropdown" id="dropdown-${item.id}"> <div style="font-weight:bold; color:var(--dark-blue); margin-bottom:10px;">Select Dates & Room Category</div> <div class="pricing-grid">${datesHTML}</div> </div> </div>; container.innerHTML += cardHTML; }); }
function togglePricing(id) { const dropdown = document.getElementById("dropdown-" + id); if (dropdown) { dropdown.classList.toggle("active"); } }
function updateFilters() { const yearSelect = document.getElementById("filter-year"); const portSelect = document.getElementById("filter-port"); const durSelect = document.getElementById("filter-duration");
if (!yearSelect || !portSelect || !durSelect) return;
const selectedYear = yearSelect.value; const selectedPort = portSelect.value; const selectedDur = durSelect.value;
const filteredList = database.filter(function(item) { const yearMatch = (item.year === "all" || item.year === selectedYear); const portMatch = (selectedPort === "all" || item.homeport === selectedPort); const durationMatch = (selectedDur === "all" || item.duration.toString() === selectedDur); return yearMatch && portMatch && durationMatch; });
renderItineraries(filteredList); }
document.addEventListener("DOMContentLoaded", function() { updateFilters(); }); </script> </body> </html>
