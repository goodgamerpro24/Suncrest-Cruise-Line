    <style>
        :root {
            --primary-blue: #104c81;
            --accent-red: #e63946;
            --light-gray: #f4f6f9;
            --dark-blue: #0b3154;
            --text-dark: #222;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--light-gray);
            color: var(--text-dark);
        }

        .navbar {
            background-color: var(--primary-blue);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        .back-btn {
            background-color: var(--accent-red);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .hero {
            background: linear-gradient(rgba(16, 76, 129, 0.75), rgba(11, 49, 84, 0.85)), url('bahamas.JPG') center/cover;
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 { margin: 0; font-size: 36px; }
        .hero p { margin: 10px 0 0 0; font-size: 18px; }

        .search-engine {
            background: white;
            max-width: 1100px;
            margin: -30px auto 30px auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 5px;
        }

        .filter-group select {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: white;
            font-size: 14px;
            outline: none;
        }

        .results-header {
            max-width: 1100px;
            margin: 0 auto 15px auto;
            padding: 0 20px;
            font-size: 18px;
            color: var(--dark-blue);
            font-weight: bold;
        }

        .itinerary-list {
            max-width: 1100px;
            margin: 0 auto 50px auto;
            padding: 0 20px;
        }

        .itinerary-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        .card-main {
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            align-items: center;
        }

        .ship-img {
            width: 220px;
            height: 140px;
            object-fit: cover;
            border-radius: 6px;
        }

        .card-details {
            flex: 1;
            padding: 0 20px;
            min-width: 280px;
        }

        .card-details h2 {
            margin: 0 0 5px 0;
            color: var(--dark-blue);
            font-size: 22px;
        }

        .ship-badge {
            display: inline-block;
            background-color: #eef4fa;
            color: var(--primary-blue);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .variant-badge {
            display: inline-block;
            background-color: #ffeef0;
            color: var(--accent-red);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
            margin-left: 5px;
        }

        .route-path {
            font-size: 14px;
            color: #444;
        }

        .card-action {
            text-align: right;
            min-width: 160px;
        }

        .price-label { font-size: 12px; color: #666; }
        .price-value { font-size: 32px; font-weight: bold; color: var(--dark-blue); margin-bottom: 10px; }

        .btn-view-dates {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        .btn-view-dates:hover {
            background-color: var(--accent-red);
        }

        .timeline-section {
            background-color: #fafbfc;
            border-top: 1px solid #f0f0f0;
            padding: 15px 20px;
        }

        .timeline-title { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 8px; }
        
        .timeline-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .timeline-day {
            background-color: #eef2f6;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: var(--dark-blue);
        }

        .pricing-dropdown {
            display: none;
            background-color: #f8fafc;
            border-top: 1px dashed #cbd5e1;
            padding: 20px;
        }

        .pricing-dropdown.active {
            display: block;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .price-card {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .price-header {
            background-color: #e2e8f0;
            color: var(--dark-blue);
            font-weight: bold;
            text-align: center;
            padding: 10px;
            font-size: 13px;
        }

        .category-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 12px;
        }

        .category-row:last-of-type { border-bottom: none; }

        .book-now-btn {
            display: block;
            background-color: var(--accent-red);
            color: white;
            text-align: center;
            padding: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>

        function renderItineraries(list) {
            const container = document.getElementById("itinerary-list");
            const counter = document.getElementById("results-count");
            
            if (!container || !counter) return;
            
            container.innerHTML = "";
            counter.innerText = list.length + " Cruise" + (list.length === 1 ? "" : "s") + " Found Matching Your Search";

            if (list.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 40px; font-weight:bold; color:#555;">No cruises found matching these options.</div>';
                return;
            }

            list.forEach(function(item) {
                let timelineHTML = "";
                item.days.forEach(function(day, index) {
                    timelineHTML += '<div class="timeline-day">Day ' + (index + 1) + ': ' + day + '</div>';
                });

                let datesHTML = "";
                item.dates.forEach(function(date) {
                    datesHTML += `
                        <div class="price-card">
                            <div class="price-header">${date.range}</div>
                            <div class="category-row">
                                <span>Interior</span>
                                <strong>$${date.prices.interior}*</strong>
                            </div>
                            <div class="category-row">
                                <span>Ocean View</span>
                                <strong>$${date.prices.oceanview}*</strong>
                            </div>
                            <div class="category-row">
                                <span>Balcony</span>
                                <strong>$${date.prices.balcony}*</strong>
                            </div>
                            <div class="category-row">
                                <span>Suite</span>
                                <strong>$${date.prices.suite}*</strong>
                            </div>
                            <a href="#" class="book-now-btn">Start Booking</a>
                        </div>
                    `;
                });

                const cardHTML = `
                    <div class="itinerary-card">
                        <div class="card-main">
                            <img src="bahamas.JPG" class="ship-img" alt="${item.ship}">
                            <div class="card-details">
                                <span class="ship-badge">🚢 ${item.ship}</span>
                                <span class="variant-badge">${item.variant}</span>
                                <h2>${item.duration}-Day Bahamas Cruise (${item.homeport})</h2>
                                <p class="route-path"><strong>Route:</strong> ${item.route}</p>
                            </div>
                            <div class="card-action">
                                <span class="price-label">Starting at</span>
                                <div class="price-value">$${item.basePrice}*</div>
                                <button class="btn-view-dates" onclick="togglePricing('${item.id}')">Show Dates</button>
                            </div>
                        </div>
                        <div class="timeline-section">
                            <div class="timeline-title">ITINERARY PATHWAY</div>
                            <div class="timeline-grid">${timelineHTML}</div>
                        </div>
                        <div class="pricing-dropdown" id="dropdown-${item.id}">
                            <div style="font-weight:bold; color:var(--dark-blue); margin-bottom:10px;">Select Dates & Room Category</div>
                            <div class="pricing-grid">${datesHTML}</div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function togglePricing(id) {
            const dropdown = document.getElementById("dropdown-" + id);
            if (dropdown) {
                dropdown.classList.toggle("active");
            }
        }

        function updateFilters() {
            const yearSelect = document.getElementById("filter-year");
            const portSelect = document.getElementById("filter-port");
            const durSelect = document.getElementById("filter-duration");

            if (!yearSelect || !portSelect || !durSelect) return;

            const selectedYear = yearSelect.value;
            const selectedPort = portSelect.value;
            const selectedDur = durSelect.value;

            const filteredList = database.filter(function(item) {
                const yearMatch = (selectedYear === "all" || item.year === selectedYear);
                const portMatch = (selectedPort === "all" || item.homeport === selectedPort);
                const durationMatch = (selectedDur === "all" || item.duration.toString() === selectedDur);
                return yearMatch && portMatch && durationMatch;
            });

            renderItineraries(filteredList);
        }

        document.addEventListener("DOMContentLoaded", function() {
            updateFilters();
        });
    </script>
