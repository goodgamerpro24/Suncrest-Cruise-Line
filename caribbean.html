        .hero {

        .hero p {

            font-weight: bold;
            color: #f1f5f9;

            border-radius: 8px;

            position: relative;
            z-index: 10;

            flex-direction: column;

            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 5px;

            border: 1px solid #e0e0e0;

        }

        }

            margin: 0 0 5px 0;
            color: var(--dark-blue);
            font-size: 22px;
        }

            background-color: #eef4fa;
            color: var(--primary-blue);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;

            color: var(--accent-red);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
            margin-left: 5px;

            font-size: 11px;
            font-weight: bold;

            margin-left: 5px;

                    classBadge: "🌴 PARADISE CLASS FLAGSHIP",
                    techFeature: "⚡ Zeus Coaster | SplashWorks Ultra | Weather Contingency Sail-away"
                };
            }

            // 2. AURORA CLASS (Modern Space-themed)
            if (shipUpper === "SUNCREST AURORA" || shipUpper === "SUNCREST NOVA" || shipUpper === "SUNCREST ECLIPSE") {
                return {
                    offset: 140,
                    classBadge: "✨ AURORA CLASS",
                    techFeature: "🎭 Digital Atrium Centerpiece | Inside-Out Weather Protection"
                };
            }

                return {

                    classBadge: "🇮🇹 FESTA HYBRID CLASS",
                    techFeature: "☀️ Retractable Glass Lido Roof | Mediterranean Styling"
                };
            }

                return {
                    offset: 10,
                    classBadge: "⚓ PANAMAX CLASS",
                    techFeature: "🔭 Split-Lido Dome | Canal Optimized Design"
                };
            }

            // 7. HIDEAWAY CLASS (Destiny/Sunshine style - Completely Modernized "Sun+Fun" Era)
            if (shipUpper === "SUNCREST HIDEAWAY" || shipUpper === "SUNCREST UTOPIA" || shipUpper === "SUNCREST RETREAT") {
                return {
                    offset: -20,
                    classBadge: "🔥 HIDEAWAY CLASS (SUN+FUN REBORN)",
                    techFeature: "💦 Complete Modernization | SplashWorks Complex | SportSquare"
                };
            }

            // 8. SEABREEZE CLASS (Fantasy-class style / Skyway bridges clearance)
            if (shipUpper === "SUNCREST SEABREEZE" || shipUpper === "SUNCREST ISLAND" || shipUpper === "SUNCREST CORAL" || shipUpper === "SUNCREST EXCITEMENT" || shipUpper === "ELATION") {
                return {
                    offset: -60, // Best Value Pricing!
                    classBadge: "⚓ SEABREEZE CLASS (SKYWAY DESIGN)",
                    techFeature: "🔲 Retrofitted Welded-Hull Balconies | Panoramic Scenic Oceanviews"
                };
            }

            return { offset: 0, classBadge: "🚢 SUNCREST FLEET", techFeature: "☀️ Sun+Fun Signature Amenities" };
        }

        function generateSailingsDatabase() {
            const sailings = [];
            const years = ["2026", "2027", "2028"];
            
            itineraryTemplates.forEach(function(tpl) {
                years.forEach(function(year) {
                    tpl.applicableShips.forEach(function(ship) {
                        const classInfo = getShipClassInformation(ship);
                        
                        // Applying specific deployment scheduling limitations
                        if (ship === "SUNCREST TRIANGLE" && tpl.homeport === "Miami" && year === "2027") {
                            sailings.push(createSailingInstance(tpl, ship, year, "May 16 - 22, 2027", classInfo));
                        } else if (ship === "SUNCREST ROMANCE" && tpl.homeport === "Miami" && year === "2027") {
                            sailings.push(createSailingInstance(tpl, ship, year, "Jul 18 - 23, 2027", classInfo));
                        } else if (ship === "SUNCREST NOVA" && tpl.homeport === "Galveston" && year === "2027") {
                            sailings.push(createSailingInstance(tpl, ship, year, "Jul 02 - 08, 2027", classInfo));
                        } else if (ship === "SUNCREST HIDEAWAY" && tpl.homeport === "Galveston" && year === "2027") {
                            sailings.push(createSailingInstance(tpl, ship, year, "Aug 15 - 21, 2027", classInfo));
                        } else if (ship === "SUNCREST GLOW" && tpl.homeport === "New Orleans" && year === "2027") {
                            sailings.push(createSailingInstance(tpl, ship, year, "May 09 - 16, 2027", classInfo));
                        } else if (ship === "SUNCREST ROMANCE" && tpl.homeport === "Port Canaveral" && year === "2027") {
                            sailings.push(createSailingInstance(tpl, ship, year, "Oct 10 - 15, 2027", classInfo));
                        } else if (ship === "SUNCREST PARADISE" && year === "2026") {
                            return; // Debuts in 2027
                        } else if (ship === "SUNCREST PARADISE" && year === "2027") {
                            sailings.push(createSailingInstance(tpl, ship, year, "Dec 05 - 12, 2027", classInfo));
                        } else {
                            // Standard static deployments
                            let rangeStr = "";
                            if (year === "2026") {
                                rangeStr = "Oct 11 - " + (11 + tpl.duration) + ", 2026";
                            } else if (year === "2027") {
                                rangeStr = "Feb 07 - " + (7 + tpl.duration) + ", 2027";
                            } else {
                                rangeStr = "Jan 09 - " + (9 + tpl.duration) + ", 2028";
                            }
                            sailings.push(createSailingInstance(tpl, ship, year, rangeStr, classInfo));
                        }
                    });
                });
            });
            return sailings;
        }

        function createSailingInstance(tpl, ship, year, dateRange, classInfo) {
            // Apply dynamic math mapping based on actual class launch eras!
            const finalBasePrice = tpl.basePrice + classInfo.offset;
            return {
                id: tpl.id + "-" + ship.toLowerCase().replace(/[\s™️®️]/g, "-") + "-" + year,
                ship: ship,
                year: year,
                homeport: tpl.homeport,
                duration: tpl.duration,
                variant: tpl.variant,
                basePrice: finalBasePrice,
                route: tpl.route,
                days: tpl.days,
                classBadge: classInfo.classBadge,
                techFeature: classInfo.techFeature,
                dates: [
                    {
                        range: dateRange,
                        prices: {
                            interior: finalBasePrice,
                            oceanview: Math.round(finalBasePrice * 1.18),
                            balcony: Math.round(finalBasePrice * 1.45),
                            suite: Math.round(finalBasePrice * 2.1)
                        }
                    }
                ]
            };
        }

        const database = generateSailingsDatabase();

        function renderItineraries(list) {
            const container = document.getElementById("itinerary-list");
            const counter = document.getElementById("results-count");
            
            if (!container || !counter) return;
            
            container.innerHTML = "";
            counter.innerText = list.length + " Caribbean Cruise" + (list.length === 1 ? "" : "s") + " Found";

            if (list.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 40px; font-weight:bold; color:#555;">No cruises found matching these options.</div>';
                return;
            }

            list.forEach(function(item) {
                let timelineHTML = "";
                item.days.forEach(function(day, index) {
                    timelineHTML += '<div class="timeline-day">Day ' + (index + 1) + ': ' + day + '</div>';
                });

                let datesHTML = "";
                item.dates.forEach(function(date) {
                    datesHTML += `
                        <div class="price-card">
                            <div class="price-header">${date.range}</div>
                            <div class="category-row">
                                <span>Interior</span>
                                <strong>$${date.prices.interior}*</strong>
                            </div>
                            <div class="category-row">
                                <span>Ocean View</span>
                                <strong>$${date.prices.oceanview}*</strong>
                            </div>
                            <div class="category-row">
                                <span>Balcony</span>
                                <strong>$${date.prices.balcony}*</strong>
                            </div>
                            <div class="category-row">
                                <span>Suite</span>
                                <strong>$${date.prices.suite}*</strong>
                            </div>
                            <a href="#" class="book-now-btn">Start Booking</a>
                        </div>
                    `;
                });

                const cardHTML = `
                    <div class="itinerary-card">
                        <div class="card-main">
                            <img src="caribbean.JPG" class="ship-img" alt="${item.ship}">
                            <div class="card-details">
                                <span class="ship-badge">🚢 ${item.ship}</span>
                                <span class="variant-badge">${item.classBadge}</span>
                                <span class="tech-badge">${item.techFeature}</span>
                                <h2>${item.duration}-Day Caribbean Cruise (${item.homeport})</h2>
                                <p class="route-path"><strong>Route:</strong> ${item.route}</p>
                            </div>
                            <div class="card-action">
                                <span class="price-label">Starting at</span>
                                <div class="price-value">$${item.basePrice}*</div>
                                <button class="btn-view-dates" onclick="togglePricing('${item.id}')">Show Dates</button>
                            </div>
                        </div>
                        <div class="timeline-section">
                            <div class="timeline-title">ITINERARY PATHWAY</div>
                            <div class="timeline-grid">${timelineHTML}</div>
                        </div>
                        <div class="pricing-dropdown" id="dropdown-${item.id}">
                            <div style="font-weight:bold; color:var(--dark-blue); margin-bottom:10px;">Select Dates & Room Category</div>
                            <div class="pricing-grid">${datesHTML}</div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function togglePricing(id) {
            const dropdown = document.getElementById("dropdown-" + id);
            if (dropdown) {
                dropdown.classList.toggle("active");
            }
        }

        function updateFilters() {
            const yearSelect = document.getElementById("filter-year");
            const portSelect = document.getElementById("filter-port");
            const durSelect = document.getElementById("filter-duration");

            if (!yearSelect || !portSelect || !durSelect) return;

            const selectedYear = yearSelect.value;
            const selectedPort = portSelect.value;
            const selectedDur = durSelect.value;

            const filteredList = database.filter(function(item) {
                const yearMatch = (selectedYear === "all" || item.year === selectedYear);
                const portMatch = (selectedPort === "all" || item.homeport === selectedPort);
                
                let durationMatch = true;
                if (selectedDur === "short") {
                    durationMatch = (item.duration <= 5);
                } else if (selectedDur === "medium") {
                    durationMatch = (item.duration >= 6 && item.duration <= 8);
                } else if (selectedDur === "long") {
                    durationMatch = (item.duration >= 9);
                }

                return yearMatch && portMatch && durationMatch;
            });

            renderItineraries(filteredList);
        }

        document.addEventListener("DOMContentLoaded", function() {
            updateFilters();
        });
    </script>
</body>
</html>
